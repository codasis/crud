<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD Operations</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface-2: #1c1c28;
      --surface-3: #22223a;
      --border: #2a2a3d;
      --border-bright: #3d3d5c;
      --accent: #6c63ff;
      --accent-2: #ff6584;
      --accent-3: #00d4aa;
      --text: #e8e8f0;
      --text-muted: #7070a0;
      --text-dim: #4a4a6a;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px 64px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -20vh;
      left: -10vw;
      width: min(600px, 80vw);
      height: min(600px, 80vw);
      background: radial-gradient(circle, rgba(108,99,255,0.14) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -10vh;
      right: -10vw;
      width: min(500px, 70vw);
      height: min(500px, 70vw);
      background: radial-gradient(circle, rgba(255,101,132,0.09) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* Noise texture overlay */
    .noise {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .wrapper {
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header {
      margin-bottom: 36px;
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 14px 5px 8px;
      margin-bottom: 16px;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .header-badge span.dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-3);
      box-shadow: 0 0 8px var(--accent-3);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.5rem, 5.5vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      position: relative;
    }

    h1 .highlight {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-line {
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
      margin-top: 20px;
    }

    /* ── Section label ── */
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Form card ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.7s 0.08s cubic-bezier(0.22,1,0.36,1) both;
    }

    .form-card::before {
      content: '';
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
      opacity: 0.7;
    }

    .form-card::after {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(108,99,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .input-group {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding-left: 4px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 0.8rem;
      pointer-events: none;
      transition: color 0.2s;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: max(16px, 0.82rem);
      padding: 11px 14px 11px 38px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      -webkit-appearance: none;
    }

    input::placeholder { color: var(--text-dim); }

    input:focus {
      border-color: var(--accent);
      background: var(--surface-3);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.12), inset 0 1px 3px rgba(0,0,0,0.3);
    }

    input:focus + .input-icon,
    .input-wrap:focus-within .input-icon {
      color: var(--accent);
    }

    /* fix icon z-order */
    .input-wrap input { position: relative; z-index: 1; }
    .input-wrap .input-icon { z-index: 2; }

    .form-actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button[type="submit"] {
      flex: 1;
      min-width: 120px;
      background: linear-gradient(135deg, var(--accent) 0%, #8b83ff 100%);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 12px 20px;
      min-height: 44px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(108,99,255,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    button[type="submit"]::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(108,99,255,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    button[type="submit"]:active { transform: translateY(0); box-shadow: 0 2px 10px rgba(108,99,255,0.3); }

    #cancelBtn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      padding: 12px 20px;
      min-height: 44px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      display: none;
    }

    #cancelBtn:hover { background: var(--surface-3); border-color: var(--border-bright); transform: translateY(-1px); }

    /* ── Table section ── */
    .table-section {
      animation: fadeUp 0.7s 0.16s cubic-bezier(0.22,1,0.36,1) both;
    }

    .table-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .record-count {
      font-size: 0.72rem;
      color: var(--text-dim);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 3px 12px;
    }

    .record-count span {
      color: var(--accent);
      font-weight: 500;
    }

    .table-wrapper {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--surface);
      /* subtle inset shadow */
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    table {
      width: 100%;
      min-width: 420px;
      border-collapse: collapse;
    }

    thead {
      background: var(--surface-2);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    thead::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--border), var(--border-bright), var(--border));
    }

    th {
      font-family: 'Syne', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 14px 18px;
      text-align: left;
      white-space: nowrap;
    }

    th:last-child, th:nth-last-child(2) {
      text-align: center;
      width: 72px;
    }

    td {
      padding: 13px 18px;
      font-size: 0.8rem;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tbody tr {
      transition: background 0.15s;
    }

    tbody tr:hover td { background: rgba(108,99,255,0.05); }

    tbody tr.row-enter {
      animation: rowIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    tbody tr.row-exit {
      animation: rowOut 0.3s ease forwards;
    }

    @keyframes rowOut {
      to { opacity: 0; transform: translateX(12px); height: 0; }
    }

    td:last-child, td:nth-last-child(2) { text-align: center; }

    /* ID cell */
    .cell-id {
      font-weight: 500;
      color: var(--accent);
      font-size: 0.75rem;
    }

    /* Password cell — masked */
    .cell-pw {
      color: var(--text-muted);
      letter-spacing: 0.2em;
      font-size: 0.7rem;
    }

    /* Action buttons */
    .btn-edit, .btn-delete {
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 6px 12px;
      min-height: 32px;
      min-width: 52px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.04em;
    }

    .btn-edit {
      background: rgba(108,99,255,0.15);
      color: #a09bff;
      border: 1px solid rgba(108,99,255,0.25);
    }

    .btn-edit:hover {
      background: rgba(108,99,255,0.25);
      transform: translateY(-1px);
      box-shadow: 0 3px 12px rgba(108,99,255,0.2);
    }

    .btn-delete {
      background: rgba(255,101,132,0.12);
      color: #ff8fa8;
      border: 1px solid rgba(255,101,132,0.2);
    }

    .btn-delete:hover {
      background: rgba(255,101,132,0.22);
      transform: translateY(-1px);
      box-shadow: 0 3px 12px rgba(255,101,132,0.2);
    }

    .btn-edit:active, .btn-delete:active { transform: translateY(0); }

    /* ── Empty state ── */
    .empty-state {
      padding: 48px 24px;
      text-align: center;
      display: none;
    }

    .empty-state .empty-icon {
      font-size: 2rem;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 0.8rem;
      color: var(--text-dim);
      line-height: 1.6;
    }

    /* ── Toast ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 16px;
      left: 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      z-index: 100;
      pointer-events: none;
    }

    .toast {
      background: var(--surface-2);
      border: 1px solid var(--border-bright);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.78rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: toastIn 0.4s cubic-bezier(0.22,1,0.36,1) both,
                 toastOut 0.3s ease 2.5s forwards;
      pointer-events: auto;
    }

    .toast.success { border-color: rgba(0,212,170,0.4); }
    .toast.success .toast-dot { background: var(--accent-3); box-shadow: 0 0 8px var(--accent-3); }
    .toast.error { border-color: rgba(255,101,132,0.4); }
    .toast.error .toast-dot { background: var(--accent-2); box-shadow: 0 0 8px var(--accent-2); }
    .toast.info { border-color: rgba(108,99,255,0.4); }
    .toast.info .toast-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

    .toast-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(16px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toastOut {
      to { opacity: 0; transform: translateY(8px); pointer-events: none; }
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    ::selection { background: rgba(108,99,255,0.3); color: var(--text); }

    /* ── Mobile tweaks ── */
    @media (max-width: 480px) {
      form { grid-template-columns: 1fr; }
      .form-actions { flex-direction: column; }
      button[type="submit"], #cancelBtn { width: 100%; }
    }

    @media (min-width: 481px) {
      body { padding: 48px 24px 80px; }
      .form-card { padding: 28px; }
    }
  </style>
</head>
<body>

<div class="noise"></div>

<div class="wrapper">

  <header>
    <div class="header-badge">
      <span class="dot"></span>
      Live Database
    </div>
    <h1>Employee <span class="highlight">Manager</span></h1>
    <div class="header-line"></div>
  </header>

  <!-- FORM -->
  <div class="section-label">Entry Form</div>
  <div class="form-card">
    <form id="frm" autocomplete="off" novalidate>
      <div class="input-group">
        <label for="i1">Employee ID</label>
        <div class="input-wrap">
          <input type="text" id="i1" placeholder="e.g. EMP-001">
          <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        </div>
      </div>

      <div class="input-group">
        <label for="i2">Password</label>
        <div class="input-wrap">
          <input type="password" id="i2" placeholder="Enter password">
          <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" id="btn">＋ Add Record</button>
        <button type="button" id="cancelBtn">✕ Cancel</button>
      </div>
    </form>
  </div>

  <!-- TABLE -->
  <div class="table-section">
    <div class="table-meta">
      <div class="section-label" style="margin-bottom:0; flex:1">Data Table</div>
      <div class="record-count"><span id="countNum">0</span> records</div>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Employee ID</th>
            <th>Password</th>
            <th>Edit</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">◎</div>
        <p>No records yet.<br>Add an employee above to get started.</p>
      </div>
    </div>
  </div>

</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  const frm       = document.getElementById('frm');
  const i1        = document.getElementById('i1');
  const i2        = document.getElementById('i2');
  const btn       = document.getElementById('btn');
  const cancelBtn = document.getElementById('cancelBtn');
  const tbody     = document.getElementById('tbody');
  const countNum  = document.getElementById('countNum');
  const emptyState= document.getElementById('emptyState');

  let data    = JSON.parse(localStorage.getItem('crudData') || '[]');
  let editIdx = null;

  /* ── Helpers ── */
  function save() { localStorage.setItem('crudData', JSON.stringify(data)); }

  function toast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span class="toast-dot"></span>${msg}`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function mask(pw) { return '•'.repeat(Math.min(pw.length, 8)); }

  function updateCount() {
    countNum.textContent = data.length;
    emptyState.style.display = data.length === 0 ? 'block' : 'none';
  }

  /* ── Render ── */
  function render() {
    tbody.innerHTML = '';
    data.forEach((item, idx) => {
      const tr = document.createElement('tr');
      tr.className = 'row-enter';
      tr.innerHTML = `
        <td class="cell-id">${escHtml(item.id)}</td>
        <td class="cell-pw">${mask(item.pw)}</td>
        <td><button class="btn-edit" data-i="${idx}">Edit</button></td>
        <td><button class="btn-delete" data-i="${idx}">Delete</button></td>
      `;
      tbody.appendChild(tr);
    });
    updateCount();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Submit ── */
  frm.addEventListener('submit', e => {
    e.preventDefault();
    const id = i1.value.trim();
    const pw = i2.value.trim();
    if (!id || !pw) { toast('Both fields are required.', 'error'); shake(frm); return; }

    if (editIdx === null) {
      if (data.some(d => d.id === id)) { toast('ID already exists!', 'error'); shake(i1); return; }
      data.push({ id, pw });
      toast('Record added successfully.', 'success');
    } else {
      data[editIdx] = { id, pw };
      toast('Record updated.', 'info');
      editIdx = null;
      btn.textContent = '＋ Add Record';
      cancelBtn.style.display = 'none';
    }

    save();
    render();
    frm.reset();
    i1.focus();
  });

  /* ── Cancel edit ── */
  cancelBtn.addEventListener('click', () => {
    editIdx = null;
    frm.reset();
    btn.textContent = '＋ Add Record';
    cancelBtn.style.display = 'none';
    i1.focus();
  });

  /* ── Edit / Delete delegation ── */
  tbody.addEventListener('click', e => {
    const editBtn   = e.target.closest('.btn-edit');
    const deleteBtn = e.target.closest('.btn-delete');

    if (editBtn) {
      const idx = +editBtn.dataset.i;
      editIdx = idx;
      i1.value = data[idx].id;
      i2.value = data[idx].pw;
      btn.textContent = '✓ Update Record';
      cancelBtn.style.display = '';
      i1.focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    if (deleteBtn) {
      const idx = +deleteBtn.dataset.i;
      const tr = deleteBtn.closest('tr');
      tr.classList.add('row-exit');
      tr.addEventListener('animationend', () => {
        data.splice(idx, 1);
        save();
        render();
        toast('Record deleted.', 'error');
      }, { once: true });
    }
  });

  /* ── Shake animation ── */
  function shake(el) {
    el.animate([
      { transform: 'translateX(0)' },
      { transform: 'translateX(-8px)' },
      { transform: 'translateX(8px)' },
      { transform: 'translateX(-5px)' },
      { transform: 'translateX(5px)' },
      { transform: 'translateX(0)' }
    ], { duration: 350, easing: 'ease' });
  }

  /* ── Init ── */
  render();
</script>
</body>
</html>
